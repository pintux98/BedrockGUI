# BedrockGUI Bedwars Addon
modules:
  shop: true
  upgrades: true
  arena: true
  stats: true

shop:
  title: "&8Shop"
  content: "Select a category"
  # category button: {category} replaced with the category name
  category-button: "&a{category}"
  # item button: {item}, {cost}, {currency}, {tier} placeholders
  item-button: "&f{item}\n&7{cost} {currency}"
  item-button-unaffordable: "&c{item}\n&7{cost} {currency}"
  back-button: "&7Back"
  close-button: "&cClose"
  purchase-success: "&aPurchased {item}."
  purchase-failed: "&cCould not purchase {item}: {reason}"
  not-in-game: "&cYou must be in a game to use the shop."
  provider-unavailable: "&cThe shop is currently unavailable."

upgrades:
  title: "&8Team Upgrades"
  content: "Buy upgrades for your team"
  # {upgrade} replaced with the upgrade display name
  upgrade-button: "&a{upgrade}"
  close-button: "&cClose"
  provider-unavailable: "&cUpgrades are currently unavailable."

arena:
  title: "&8Play BedWars"
  content: "Select an arena"
  # {arena}, {state}, {players}, {max}, {group} placeholders
  arena-button: "&a{arena}\n&7{state} &8| &7{players}/{max}"
  close-button: "&cClose"
  no-arenas: "&cNo arenas are available right now."
  join-failed: "&cCould not join {arena}."
  provider-unavailable: "&cArena joining is currently unavailable."

stats:
  title: "&8Your Stats"
  # case-insensitive substring used to recognize the native stats chest GUI by its title
  gui-title-contains: "stat"
  # placeholders: {name} {wins} {losses} {kills} {final_kills} {deaths}
  #               {final_deaths} {beds} {games} {total_kills} {kd} {wl}
  content: "&aWins: &f{wins}  &cLosses: &f{losses}\n&aKills: &f{kills}  &aFinal Kills: &f{final_kills}\n&cDeaths: &f{deaths}  &cFinal Deaths: &f{final_deaths}\n&eBeds Broken: &f{beds}\n&7Games Played: &f{games}\n&7K/D: &f{kd}  &7W/L: &f{wl}"
  close-button: "&cClose"
  refresh-button: "&aRefresh"
  provider-unavailable: "&cStats are currently unavailable."

sounds:
  enabled: true
  form-open: "UI_BUTTON_CLICK"
  purchase-success: "ENTITY_PLAYER_LEVELUP"
  purchase-failed: "BLOCK_NOTE_BLOCK_PLING"
  volume: 1.0
  pitch: 1.0
