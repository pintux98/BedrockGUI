name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Read version from gradle.properties
        id: version
        run: echo "VERSION=$(grep '^projectVersion=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"

      - name: Build all JARs
        run: ./gradlew -PlocalOutputDir= :common:jar :bungeecord:shadowJar :paper:shadowJar :velocity:shadowJar :essentials-addon:shadowJar :bedwars-addon:shadowJar :homestead-addon:shadowJar

      - name: Collect JARs
        run: |
          mkdir -p release-artifacts
          cp common/build/libs/BedrockGUI-API.jar release-artifacts/
          cp bungeecord/build/libs/BedrockGUI-Bungee-*.jar release-artifacts/
          cp paper/build/libs/BedrockGUI-Paper-*.jar release-artifacts/
          cp velocity/build/libs/BedrockGUI-Velocity-*.jar release-artifacts/
          cp essentials-addon/build/libs/BedrockGUI-EssentialsAddon-*.jar release-artifacts/
          cp bedwars-addon/build/libs/BedrockGUI-BedwarsAddon-*.jar release-artifacts/
          cp homestead-addon/build/libs/BedrockGUI-HomesteadAddon-*.jar release-artifacts/
          ls -la release-artifacts/

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: "v${{ steps.version.outputs.VERSION }}"
          name: "BedrockGUI v${{ steps.version.outputs.VERSION }}"
          commit: ${{ github.sha }}
          allowUpdates: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          artifacts: "release-artifacts/*"
