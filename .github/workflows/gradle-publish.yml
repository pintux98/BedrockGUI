name: Build & Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build all JARs
        run: ./gradlew :common:jar :bungeecord:shadowJar :paper:shadowJar :velocity:shadowJar :essentials-addon:shadowJar

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          allowUpdates: true
          artifacts: |
            common/build/libs/BedrockGUI-API.jar
            bungeecord/build/libs/BedrockGUI-Bungee-*.jar
            paper/build/libs/BedrockGUI-Paper-*.jar
            velocity/build/libs/BedrockGUI-Velocity-*.jar
            essentials-addon/build/libs/BedrockGUI-EssentialsAddon-*.jar
