            }

      back_hub:
        text: "§7← Back to Hub"
        onClick:
          - |
            open {
              - "main_hub"
            }

  error_test_menu:
    type: "SIMPLE"
    title: "§c§l⚠️ Error Handling Tests"
    content: "§7Test error handling and edge cases"
    buttons:
