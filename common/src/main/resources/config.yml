            message {
              - "§e§lMedium load test starting..."
            }
          - |
            sound {
              - "ui.button.click"
              - "entity.experience_orb.pickup:0.8:1.0"
            }
          - |
            economy {
              - "add:50"
              - "check:50"
            }
          - |
            actionbar {
              - "§e§lMedium load complete!"
            }

      heavy_load:
        text: "§c§l🔴 Heavy Load (10+ actions)"
        onClick:
          - |
            message {
              - "§c§l=== HEAVY LOAD TEST ==="
