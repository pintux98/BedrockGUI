    buttons:
      light_load:
        text: "§a§l🟢 Light Load (3 actions)"
        onClick:
          - |
            message {
              - "§a§lLight load test starting..."
            }
          - |
            sound {
              - "ui.button.click"
            }
          - |
            actionbar {
              - "§a§lLight load complete!"
            }

      medium_load:
        text: "§e§l🟡 Medium Load (6 actions)"
        onClick:
