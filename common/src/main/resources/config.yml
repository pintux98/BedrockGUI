            message {
              - "§7Testing error handling for edge cases..."
            }
          - |
            command {
              - "me testing error handling"
            }

      invalid_format:
        text: "§c§l⚠️ Invalid Format Test"
        onClick:
          - |
            message {
              - "§c§lTesting invalid operations..."
              - "§7Some operations may fail - this is expected"
            }
          - |
            economy {
              - "invalid_operation:999"
              - "add:100"
            }
          - |
            message {
              - "§a§lError handling test completed!"
            }

      back_advanced:
