              - "§eHeavy Load 5/8"
              - "§fHeavy Load 6/8"
              - "§1Heavy Load 7/8"
              - "§2Heavy Load 8/8 - DONE!"
            }
          - |
            economy {
              - "add:100"
              - "add:200"
              - "add:300"
              - "check:600"
            }
          - |
