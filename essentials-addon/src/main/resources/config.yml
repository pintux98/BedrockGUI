# ─────────────────────────────────────────────
# BedrockGUI Essentials Addon — config.yml
# ─────────────────────────────────────────────
# Each module is DISABLED by default.
# Set to true, then run /essentialsaddon reload
# to activate only the features you need.

# DO NOT CHANGE THIS VALUE — managed by the plugin.
config-version: 2

modules:
  warps: false
  kits: false
  homes: false
  tpa: false
  shopgui-plus: false
  economyshop-gui: false
  mypet: false

# Register actions without internal forms (requires module: false).
actions-only:
  warps: false
  kits: false
  homes: false
  tpa: false
  shopgui-plus: false
  economyshop-gui: false
  mypet: false

# Master switches (apply on top of the per-module toggles above).
# integrated-gui: serve the built-in forms AND intercept commands / shop menus for
#   Bedrock players. Set false to stop all interception and build your own forms.
# register-actions: register the action handlers so any form can drive Essentials.
#   Keep true (with integrated-gui false) for an actions-only setup.
integrated-gui: true
register-actions: true

# ─────────────────────────────────────────────
# Hub — unified main menu shown to Bedrock players
# Buttons are generated dynamically from enabled modules.
# ─────────────────────────────────────────────
hub:
  title: '&6&lEssentials Menu'
  content: '&7Select a feature to use.'
  # Per-module button labels (shown in the hub)
  button-warps: '&b&lWarps'
  button-kits: '&6&lKits'
  button-homes: '&a&lHomes'
  button-tpa: '&e&lTeleport'
  button-shopgui-plus: '&2&lShopGUI+'
  button-economyshop-gui: '&2&lEconomyShop'
  button-mypet: '&d&lPets'

