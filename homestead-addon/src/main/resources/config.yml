# ============================================================
#  BedrockGUI - Homestead Addon
#  Serves native Bedrock forms to Bedrock (Geyser/Floodgate)
#  players in place of Homestead's chest GUIs. Java players are
#  untouched. All text supports & colour codes and %placeholders%.
# ============================================================
config-version: 1

# Integrated GUIs = this addon's own Bedrock forms PLUS auto-interception of the
# Homestead GUI commands (/region, /rg, /hs, /homestead, /homesteadadmin) for
# Bedrock players. Turn this OFF if you want to build your own forms and only use
# the hs_* actions below (no command hijacking, no built-in menus on intercept).
integrated-gui: true

# Register the hs_* action handlers with BedrockGUI so any form (including your
# own custom menus) can open Homestead screens or run Homestead actions.
# Always active while integrated-gui is true (the built-in menus need them).
register-actions: true

general:
  # Buttons per page for long lists (regions, members, chunks, ...).
  items-per-page: 18

sounds:
  enabled: true
  form-open: "ui.button.click"
  action-success: "random.orb"
  action-failed: "note.bass"
  volume: 1.0
  pitch: 1.0

